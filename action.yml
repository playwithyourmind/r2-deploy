name: 'R2 Deploy'
description: 'Deploy static sites to Cloudflare R2'
inputs:
  bucket:
    description: 'R2 bucket name (plain text)'
    required: true
  account-id:
    description: 'Cloudflare account ID (plain text)'
    required: true
  access-key-id:
    description: 'R2 API token access key ID (store as a GitHub secret)'
    required: true
  secret-access-key:
    description: 'R2 API token secret access key (store as a GitHub secret)'
    required: true
runs:
  using: 'node24'
  main: 'dist/index.js'
